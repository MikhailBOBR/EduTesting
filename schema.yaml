  /api/stats/:
    get:
      operationId: stats_retrieve
      description: Возвращает агрегированные показатели для демонстрации API в Swagger
        и Postman.
      summary: Сводная статистика сервиса
      tags:
      - stats
      security:
      - tokenAuth: []
      - cookieAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiStats'
          description: ''
components:
  schemas:
    ApiAnalyticsTopicRow:
      type: object
      properties:
        topic:
          type: string
        total_questions:
          type: integer
        correct_answers:
          type: integer
        awarded_points:
          type: integer
        total_points:
          type: integer
        accuracy_percent:
          type: integer
        points_percent:
          type: integer
        status_code:
          type: string
        status_label:
          type: string
        recommendation:
          type: string
        students_count:
          type: integer
        attempts_count:
          type: integer
      required:
      - accuracy_percent
      - awarded_points
      - correct_answers
      - points_percent
      - recommendation
      - status_code
      - status_label
      - topic
      - total_points
      - total_questions
    ApiAnnouncement:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        title:
          type: string
          title: Заголовок
          maxLength: 200
