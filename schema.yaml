openapi: 3.0.3
info:
  title: EduTesting API
  version: 1.0.0
  description: |-
    Полноценный API платформы онлайн-тестирования студентов с акцентом на практические backend-сценарии: безопасную авторизацию, автосохранение черновика, сравнение попыток, достижения, аналитику курса, индивидуальные условия, апелляции, контроль подозрительных попыток и административное сопровождение проекта.

    Что особенно удобно демонстрировать в Swagger UI:
    * токен-авторизацию, смену пароля и защиту от перебора паролей;
    * студенческий поток: запись на курс, старт попытки, автосохранение, отправку и просмотр результата;
    * преподавательский поток: аналитику курса, integrity-контроль, индивидуальные условия и рассмотрение апелляций;
    * обзорные публичные методы: статистику сервиса, каталог курсов и описание тестов.

    Для защищенных методов сначала выполните `POST /api/auth/token/`, затем нажмите `Authorize` и передайте токен в формате `Token ваш_токен`.
  contact:
    name: Кашпирев М.Д.
  license:
    name: All rights reserved
paths:
  /api/appeals/{id}/review/:
    post:
      operationId: appeals_review_create
      description: Позволяет преподавателю принять, отклонить или вернуть апелляцию
        в статус ожидания.
      summary: Рассмотрение апелляции преподавателем
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - appeals
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ApiAttemptAppealReviewRequest'
            examples:
              ПримерРешенияПоАпелляции:
                value:
                  status: rejected
                  teacher_response: Результат оставлен без изменения, так как критерий
                    требует полного совпадения ответа.
                summary: Пример решения по апелляции
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/ApiAttemptAppealReviewRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/ApiAttemptAppealReviewRequest'
        required: true
      security:
      - tokenAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiAttemptAppeal'
          description: ''
  /api/attempts/{id}/:
    get:
      operationId: attempts_retrieve
      description: 'Возвращает подробный результат попытки: ответы, рекомендации,
        сравнение, апелляцию, review и новые достижения.'
      summary: Детальная информация о попытке
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - attempts
      security:
      - tokenAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiAttemptDetail'
          description: ''
  /api/attempts/{id}/appeal/:
    post:
      operationId: attempts_appeal_create
      description: Создает новую апелляцию по завершенной попытке или обновляет текст
        еще не рассмотренной апелляции.
      summary: Подача апелляции по попытке
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - attempts
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ApiAttemptAppealRequest'
            examples:
              ПримерАпелляции:
                value:
                  message: Прошу пересмотреть результат по одному из вопросов, так
                    как ответ частично совпадает с эталоном.
                summary: Пример апелляции
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/ApiAttemptAppealRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/ApiAttemptAppealRequest'
        required: true
      security:
      - tokenAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiAttemptAppeal'
          description: ''
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiAttemptAppeal'
          description: ''
  /api/attempts/{id}/draft/:
    post:
      operationId: attempts_draft_create
      description: Сохраняет промежуточные ответы студента и последнюю активную позицию
        в тесте.
      summary: Автосохранение черновика попытки
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - attempts
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ApiAttemptDraftSaveRequest'
            examples:
              ПримерЧерновика:
                value:
                  answers:
                    '1':
                    - 2
                  last_question_id: 1
                summary: Пример черновика
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/ApiAttemptDraftSaveRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/ApiAttemptDraftSaveRequest'
        required: true
      security:
      - tokenAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiAttemptDraft'
          description: ''
  /api/attempts/{id}/submit/:
    post:
      operationId: attempts_submit_create
      description: Завершает попытку, проверяет ответы и возвращает подробный результат
        с аналитикой и дополнительными блоками.
      summary: Отправка попытки на проверку
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - attempts
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ApiAttemptSubmitRequest'
            examples:
              ПримерТелаЗапроса:
                value:
                  answers:
                    '1':
                    - 2
                    '2':
                    - 4
                    - 6
                summary: Пример тела запроса
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/ApiAttemptSubmitRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/ApiAttemptSubmitRequest'
        required: true
      security:
      - tokenAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiAttemptDetail'
          description: ''
  /api/auth/password/change/:
    post:
      operationId: auth_password_change_create
      description: Позволяет авторизованному пользователю сменить пароль через API.
        Новый пароль проходит стандартную валидацию Django, а после успешной смены
        выдается новый токен для дальнейшей работы в Postman и Swagger.
      summary: Смена пароля
      tags:
      - auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ApiPasswordChangeRequest'
            examples:
              ПримерСменыПароля:
                value:
                  current_password: StudentDemo123!
                  new_password: StudentDemo456!
                  new_password_confirm: StudentDemo456!
                summary: Пример смены пароля
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/ApiPasswordChangeRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/ApiPasswordChangeRequest'
        required: true
      security:
      - tokenAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiPasswordChangeResponse'
              examples:
                ПримерОтвета:
                  value:
                    detail: Пароль обновлен. Используйте новый токен для API-запросов.
                    token: 0123456789abcdef0123456789abcdef01234567
                  summary: Пример ответа
          description: ''
  /api/auth/token/:
    post:
      operationId: auth_token_create
      description: Авторизует пользователя по логину и паролю и возвращает токен для
        дальнейшей работы в Postman и Swagger. После серии неудачных попыток вход
        временно блокируется для защиты от перебора паролей.
      summary: Получение токена авторизации
      tags:
      - auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ApiTokenRequest'
            examples:
              ПримерЗапроса:
                value:
                  username: student_demo
                  password: StudentDemo123!
                summary: Пример запроса
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/ApiTokenRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/ApiTokenRequest'
        required: true
      security:
      - tokenAuth: []
      - cookieAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiTokenResponse'
          description: ''
  /api/courses/:
    get:
      operationId: courses_list
      description: Публичный каталог курсов с краткой информацией, владельцем и количеством
        опубликованных тестов.
      summary: Список опубликованных курсов
      tags:
      - courses
      security:
      - tokenAuth: []
      - cookieAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ApiCourseList'
          description: ''
  /api/courses/{id}/:
    get:
      operationId: courses_retrieve
      description: Возвращает полное описание курса, список опубликованных тестов
        и объявления.
      summary: Детальная информация о курсе
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - courses
      security:
      - tokenAuth: []
      - cookieAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiCourseDetail'
          description: ''
  /api/courses/{id}/analytics/:
    get:
      operationId: courses_analytics_retrieve
      description: Сводит общую точность по курсу, слабые темы, студентов с рисками
        и лидерборд.
      summary: Аналитика курса для преподавателя
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - courses
      security:
      - tokenAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiCourseAnalytics'
          description: ''
  /api/courses/{id}/enroll/:
    post:
      operationId: courses_enroll_create
      description: Создает запись студента на опубликованный курс или подтверждает,
        что запись уже существует.
      summary: Запись студента на курс
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - courses
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ApiEnrollmentResponse'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/ApiEnrollmentResponse'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/ApiEnrollmentResponse'
        required: true
      security:
      - tokenAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiEnrollmentResponse'
          description: ''
  /api/courses/{id}/integrity/:
    get:
      operationId: courses_integrity_retrieve
      description: 'Возвращает попытки с дополнительными флагами внимания: слишком
        быстрое завершение, идеальный результат за короткое время и резкий скачок
        между попытками.'
      summary: Контроль подозрительных попыток по курсу
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - courses
      security:
      - tokenAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiCourseIntegrity'
          description: ''
  /api/me/:
    get:
      operationId: me_retrieve
      description: Возвращает профиль авторизованного пользователя с ролью, почтой
        и учебной группой.
      summary: Информация о текущем пользователе
      tags:
      - me
      security:
      - tokenAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiUser'
          description: ''
  /api/my/achievements/:
    get:
      operationId: my_achievements_list
      description: 'Возвращает вычисляемые достижения текущего пользователя: первые
        завершенные попытки, идеальные результаты, серии успешных прохождений и сильный
        прогресс.'
      summary: Мои достижения
      tags:
      - my
      security:
      - tokenAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ApiStudentAchievement'
          description: ''
  /api/my/courses/:
    get:
      operationId: my_courses_list
      description: Для студента возвращает курсы по записи, для преподавателя — управляемые
        курсы.
      summary: Мои курсы
      tags:
      - my
      security:
      - tokenAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ApiMyCourse'
          description: ''
  /api/quizzes/{id}/:
    get:
      operationId: quizzes_retrieve
      description: Возвращает описание теста, вопросы, настройки доступности и эффективные
        ограничения для текущего пользователя.
      summary: Детальная информация о тесте
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - quizzes
      security:
      - tokenAuth: []
      - cookieAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiQuizDetail'
          description: ''
  /api/quizzes/{id}/attempts/:
    get:
      operationId: quizzes_attempts_retrieve
      description: Возвращает журнал завершенных попыток с краткой сводкой по результату
        и индикаторам integrity-контроля.
      summary: Список попыток по тесту для преподавателя
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - quizzes
      security:
      - tokenAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiQuizAttemptsResponse'
          description: ''
  /api/quizzes/{id}/overrides/:
    get:
      operationId: quizzes_overrides_list
      description: Показывает все персональные условия по тесту для студентов курса.
      summary: Список индивидуальных условий по тесту
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - quizzes
      security:
      - tokenAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ApiQuizAccessOverride'
          description: ''
    post:
      operationId: quizzes_overrides_create
      description: Позволяет преподавателю выдать студенту дополнительные попытки,
        время и комментарий по тесту.
      summary: Создание или обновление индивидуальных условий
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - quizzes
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ApiQuizAccessOverrideRequest'
            examples:
              ПримерИндивидуальныхУсловий:
                value:
                  student_id: 6
                  extra_time_minutes: 15
                  extra_attempts: 1
                  notes: Индивидуальные условия для демонстрации API.
                  is_active: true
                summary: Пример индивидуальных условий
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/ApiQuizAccessOverrideRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/ApiQuizAccessOverrideRequest'
        required: true
      security:
      - tokenAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiQuizAccessOverride'
          description: ''
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiQuizAccessOverride'
          description: ''
  /api/quizzes/{id}/start/:
    post:
      operationId: quizzes_start_create
      description: Создает новую попытку или переиспользует уже активную, если студент
        не завершил предыдущее прохождение.
      summary: Старт попытки по тесту
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - quizzes
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ApiAttemptStartResponse'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/ApiAttemptStartResponse'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/ApiAttemptStartResponse'
        required: true
      security:
      - tokenAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiAttemptStartResponse'
          description: ''
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiAttemptStartResponse'
          description: ''
  /api/schema/:
    get:
      operationId: schema_retrieve
      description: |-
        OpenApi3 schema for this API. Format can be selected via content negotiation.

        - YAML: application/vnd.oai.openapi
        - JSON: application/vnd.oai.openapi+json
