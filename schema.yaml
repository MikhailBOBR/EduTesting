      enum:
      - autumn
      - spring
      type: string
      description: |-
        * `autumn` - Осенний семестр
        * `spring` - Весенний семестр
  securitySchemes:
    cookieAuth:
      type: apiKey
      in: cookie
      name: sessionid
    tokenAuth:
      type: apiKey
      in: header
      name: Authorization
      description: Token-based authentication with required prefix "Token"
