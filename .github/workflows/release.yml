name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    name: Build release assets
    runs-on: ubuntu-latest

    env:
      DJANGO_ALLOWED_HOSTS: 127.0.0.1,localhost,testserver
      DJANGO_DEBUG: "1"
      DJANGO_SECRET_KEY: release-secret-key-for-github-actions
      PYTHONUNBUFFERED: "1"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run release checks
        run: |
          python manage.py check
          python manage.py makemigrations --check --dry-run
          python manage.py test --verbosity 2

      - name: Prepare assets
        run: |
          mkdir -p dist
          python manage.py spectacular --file dist/schema.yaml --validate
          cp docs/EduTesting.postman_collection.json dist/
          cp docs/EduTesting.postman_environment.json dist/
          cp docs/wiki/release-checklist.md dist/
          git archive --format=zip --output "dist/edutesting-${{ github.ref_name }}.zip" HEAD

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          name: EduTesting ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            dist/edutesting-${{ github.ref_name }}.zip
            dist/schema.yaml
            dist/EduTesting.postman_collection.json
            dist/EduTesting.postman_environment.json
            dist/release-checklist.md
